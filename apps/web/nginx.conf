server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 보안 헤더 ──
    # 프록시 앞단(Nginx reverse proxy)에서 HSTS/CSP 등 일부 헤더는 중첩 가능하므로
    # 여기서는 웹 컨테이너 자체에서도 기본 방어를 걸어둔다 (defense in depth)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=(self)" always;
    # HSTS는 TLS가 종료되는 프록시(앞단 Nginx)에서 설정하는 게 권장이지만,
    # 동일 도메인에서 바로 서빙되는 경우에 대비한 기본값
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # ── gzip ──
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff2;

    # ── 에러/액세스 로그 ──
    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    # ── 클라이언트 업로드 크기 제한 (백엔드 50MB와 일치) ──
    client_max_body_size 60m;

    # ── 정적 자산 캐시 (immutable 빌드 해시) ──
    # 주의: 이 block이 SPA fallback보다 먼저 매칭되어야 한다
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── API 프록시 → backend ──
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 (업로드/장시간 처리 대응)
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # 버퍼 (nginx warnings 방지)
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Socket.IO WebSocket ──
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 장시간 연결 유지
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── uploads 정적 파일 ──
    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 업로드 파일은 일정 시간 캐시 허용
        expires 1h;
    }

    # ── 숨김 파일 접근 차단 ──
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── SPA fallback (모든 다른 경로) ──
    location / {
        try_files $uri $uri/ /index.html;
        # SPA index.html은 캐시 안 함 (배포 즉시 반영)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
