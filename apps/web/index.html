<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Office</title>
    <script>
      // 다크모드 깜빡임 방지 (FOUC prevention)
      (function(){
        try {
          var s = JSON.parse(localStorage.getItem('po-layout-settings') || '{}');
          if (s.theme === 'dark' || (!s.theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
