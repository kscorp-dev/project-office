services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project_office}
      POSTGRES_USER: ${POSTGRES_USER:-po_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-po_secret}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${PG_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-po_user} -d ${POSTGRES_DB:-project_office}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-po_user}:${POSTGRES_PASSWORD:-po_secret}@postgres:5432/${POSTGRES_DB:-project_office}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "${BACKEND_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Web Frontend ──
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # 빌드 타임에 API_URL 주입 (Vite는 빌드 시점에 env를 정적 번들링함)
        # 프로덕션(Nginx 리버스 프록시): /api
        # 개발 외부 접근: http://<host>:3001/api 등
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"

  # ── Detection (YOLO) ──
  detection:
    build:
      context: ./apps/detection
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_WEBHOOK_URL: ${BACKEND_WEBHOOK_URL:-http://backend:3000/api/parking/events/webhook}
    ports:
      - "${DETECTION_PORT:-8100}:8100"
    volumes:
      - detection_data:/app/results
    deploy:
      resources:
        limits:
          memory: 1.5G
    profiles:
      - detection

volumes:
  pg_data:
  redis_data:
  uploads_data:
  detection_data:
